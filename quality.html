<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quality Tracker - Apps Script Integration</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="shortcut icon" href="img/Logo square.webp" type="image/x-icon">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          }
        }
      }
    };
  </script>

  <style>
    [data-theme="dark"] {
      --bg: #0B0D13;
      --bg-raised: #11131B;
      --card: #161923;
      --card-hover: #1C1F2E;
      --border: #24273A;
      --border-strong: #323652;
      --text: #E2E4EA;
      --text-sec: #9298AD;
      --text-muted: #5C6178;
      --accent: #191265;
      --accent-hover: #191265;
      --accent-bg: rgba(25, 18, 101, 0.07);
      --accent-border: rgba(25, 18, 101, 0.18);
      --success: #34D399;
      --success-bg: rgba(52, 211, 153, 0.10);
      --warning: #FBBF24;
      --warning-bg: rgba(251, 191, 36, 0.10);
      --danger: #F87171;
      --danger-bg: rgba(248, 113, 113, 0.10);
      --skel-base: #1C1F2E;
      --skel-shine: rgba(255, 255, 255, 0.035);
      --row-alt: rgba(255, 255, 255, 0.015);
      --header-bg: rgba(11, 13, 19, 0.82);
      
      --score-1-bg: rgba(248, 113, 113, 0.1); --score-1-text: #F87171;
      --score-2-bg: rgba(251, 191, 36, 0.1); --score-2-text: #FBBF24;
      --score-3-bg: rgba(163, 230, 53, 0.1);  --score-3-text: #A3E635;
      --score-4-bg: rgba(45, 212, 191, 0.1);  --score-4-text: #2DD4BF;
      --score-5-bg: rgba(52, 211, 153, 0.1);  --score-5-text: #34D399;
    }

    [data-theme="light"] {
      --bg: #F2F3F7;
      --bg-raised: #E8EAF0;
      --card: #FFFFFF;
      --card-hover: #F7F8FA;
      --border: #DDE0E8;
      --border-strong: #C4C8D4;
      --text: #14161E;
      --text-sec: #555868;
      --text-muted: #9095A7;
      --accent: #191265;
      --accent-hover: #191265;
      --accent-bg: rgba(25, 18, 101, 0.07);
      --accent-border: rgba(25, 18, 101, 0.18);
      --success: #059669;
      --success-bg: rgba(5, 150, 105, 0.07);
      --warning: #D97706;
      --warning-bg: rgba(217, 119, 6, 0.07);
      --danger: #DC2626;
      --danger-bg: rgba(220, 38, 38, 0.07);
      --skel-base: #E8EAF0;
      --skel-shine: rgba(255, 255, 255, 0.65);
      --row-alt: rgba(0, 0, 0, 0.018);
      --header-bg: rgba(242, 243, 247, 0.82);

      --score-1-bg: rgba(220, 38, 38, 0.1); --score-1-text: #DC2626;
      --score-2-bg: rgba(217, 119, 6, 0.1); --score-2-text: #D97706;
      --score-3-bg: rgba(132, 204, 22, 0.1);  --score-3-text: #84CC16;
      --score-4-bg: rgba(20, 184, 166, 0.1);  --score-4-text: #14B8A6;
      --score-5-bg: rgba(5, 150, 105, 0.1);   --score-5-text: #059669;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      transition: background 0.35s, color 0.35s;
    }

    .font-display { font-family: 'Space Grotesk', sans-serif; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

    .skeleton {
      position: relative; overflow: hidden; background: var(--skel-base); border-radius: 6px;
    }
    .skeleton::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, var(--skel-shine) 50%, transparent 100%);
      transform: translateX(-100%); animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer { to { transform: translateX(100%); } }

    .data-table { border-collapse: separate; border-spacing: 0; width: 100%; }
    .data-table th {
      position: sticky; top: 0; z-index: 6; background: var(--card);
      color: var(--text-sec); font-weight: 600; font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
      border-bottom: 1.5px solid var(--border-strong); padding: 10px 12px;
      text-align: left; user-select: none; cursor: pointer; transition: color 0.2s;
    }
    .data-table th:hover { color: var(--text); }
    .data-table th.sorted { color: var(--accent); }
    .data-table th.no-sort { cursor: default; }
    .data-table th.no-sort:hover { color: var(--text-sec); }
    .data-table td {
      padding: 9px 12px; font-size: 0.78rem; border-bottom: 1px solid var(--border);
      white-space: nowrap; color: var(--text); transition: background 0.15s;
    }
    .data-table tbody tr { transition: background 0.15s; }
    .data-table tbody tr:nth-child(even) { background: var(--row-alt); }
    .data-table tbody tr:hover { background: var(--accent-bg); }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 999px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.02em;
    }
    .badge-1 { background: var(--score-1-bg); color: var(--score-1-text); }
    .badge-2 { background: var(--score-2-bg); color: var(--score-2-text); }
    .badge-3 { background: var(--score-3-bg); color: var(--score-3-text); }
    .badge-4 { background: var(--score-4-bg); color: var(--score-4-text); }
    .badge-5 { background: var(--score-5-bg); color: var(--score-5-text); }
    .badge-muted { background: var(--bg-raised); color: var(--text-muted); }
    .badge-day { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }

    #toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 9999;
      display: flex; flex-direction: column-reverse; gap: 8px;
    }
    .toast-msg {
      padding: 10px 18px; border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      color: #fff; max-width: 360px; background: var(--border-strong);
      border-left: 3px solid var(--accent);
      transform: translateX(120%); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s;
    }
    .toast-msg.visible { transform: translateX(0); opacity: 1; }
    .toast-msg.toast-error { border-left-color: var(--danger); }
    .toast-msg.toast-success { border-left-color: var(--success); }

    .theme-icon { transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1); }
    [data-theme="light"] .theme-icon { transform: rotate(180deg); }

    .table-wrap::-webkit-scrollbar { height: 6px; }
    .table-wrap::-webkit-scrollbar-track { background: var(--bg-raised); }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .tutor-name-cell { display: flex; align-items: center; gap: 10px; }
    .tutor-avatar {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 700; flex-shrink: 0;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--accent); background: var(--accent-bg); border: 1px solid var(--accent-border);
    }

    .filter-select {
      appearance: none;
      background-color: var(--card);
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%239298AD' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 28px;
    }
    .filter-select option { background: var(--card); color: var(--text); }

    /* Modal Styles */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease-in-out;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .modal-content {
      background: var(--card);
      width: 90%; max-width: 600px;
      max-height: 90vh;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex; flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.2s ease-in-out;
    }
    .modal-overlay.active .modal-content { transform: scale(1); }

    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: start; }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; background: var(--bg-raised); border-radius: 0 0 12px 12px; }

    .label-text { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .note-text { white-space: pre-wrap; line-height: 1.6; font-size: 0.85rem; color: var(--text); }

    /* Error Section */
    #error-section { display: none; }
    #error-section.active { display: block; }
  </style>
</head>

<body>

  <div class="border-b" style="background:var(--accent-bg);border-color:var(--accent-border);">
    <div class="max-w-[1440px] mx-auto px-4 sm:px-6 py-2 flex items-center gap-2 text-[0.72rem]" style="color:var(--accent);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
        <circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" />
      </svg>
      <span>Connecting to <strong>Live Database</strong>. Data refreshes automatically.</span>
    </div>
  </div>

  <header class="sticky top-0 z-40 border-b backdrop-blur-xl" style="background:var(--header-bg);border-color:var(--border);">
    <div class="max-w-[1440px] mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 rounded-md flex items-center justify-center" style="background:var(--accent-bg);border:1px solid var(--accent-border);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <h1 class="font-display font-bold text-base tracking-tight" style="color:var(--text);">Quality Tracker</h1>
      </div>
      <div class="flex items-center gap-1.5">
        <button id="btn-refresh" aria-label="Refresh data" class="w-8 h-8 rounded-md flex items-center justify-center transition-colors hover:bg-[var(--accent-bg)]" style="color:var(--text-sec);">
           <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6" /><path d="M3 12a9 9 0 0 1 15-6.7L21 8" /><path d="M3 22v-6h6" /><path d="M21 12a9 9 0 0 1-15 6.7L3 16" /></svg>
        </button>
        <button id="btn-export" aria-label="Export CSV" class="w-8 h-8 rounded-md flex items-center justify-center transition-colors hover:bg-[var(--accent-bg)]" style="color:var(--text-sec);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" />
          </svg>
        </button>
        <button id="btn-theme" aria-label="Toggle dark mode" class="w-8 h-8 rounded-md flex items-center justify-center transition-colors hover:bg-[var(--accent-bg)]" style="color:var(--text-sec);">
          <svg class="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-[1440px] mx-auto px-4 sm:px-6 pb-16">
    
    <!-- Error Section (Hidden by default) -->
    <section id="error-section" class="mt-10 text-center py-16 rounded-xl border" style="border-color:var(--border);background:var(--card);">
      <div class="mx-auto w-12 h-12 rounded-full flex items-center justify-center mb-4" style="background:var(--danger-bg);">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" /><line x1="15" y1="9" x2="9" y2="15" /><line x1="9" y1="9" x2="15" y2="15" />
        </svg>
      </div>
      <p class="font-display font-semibold text-sm mb-1" style="color:var(--text);">Failed to load data</p>
      <p id="error-msg" class="text-xs mb-5" style="color:var(--text-muted);">Network error or quota limit reached.</p>
      <div class="flex items-center justify-center gap-3">
        <button id="btn-retry" class="px-4 py-2 rounded-lg text-xs font-semibold transition-colors" style="background:var(--accent);color:#fff;">Retry</button>
        <button id="btn-use-cache" class="hidden px-4 py-2 rounded-lg text-xs font-semibold border transition-colors" style="border-color:var(--border-strong);color:var(--text-sec);">Use Cached Data</button>
      </div>
    </section>

    <!-- Controls -->
    <section id="controls-section" class="mt-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
      <div class="flex items-center gap-2 w-full sm:w-auto flex-wrap">
        <div class="relative w-full sm:w-72">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input id="search-input" type="text" placeholder="Search tutor or student..." aria-label="Search"
            class="w-full pl-9 pr-3 py-2 rounded-lg text-xs border outline-none transition-colors"
            style="background-color:var(--card);border-color:var(--border);color:var(--text);"
            onfocus="this.style.borderColor='var(--accent-border)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <select id="filter-quality" aria-label="Filter by quality score"
          class="filter-select px-3 py-2 rounded-lg text-xs border outline-none cursor-pointer transition-colors"
          style="border-color:var(--border);color:var(--text);">
          <option value="">All Scores (1-5)</option>
          <option value="5">5 - Excellent</option>
          <option value="4">4 - Very Good</option>
          <option value="3">3 - Good</option>
          <option value="2">2 - Fair</option>
          <option value="1">1 - Needs Improvement</option>
        </select>
        <select id="filter-package" aria-label="Filter by package"
          class="filter-select px-3 py-2 rounded-lg text-xs border outline-none cursor-pointer transition-colors"
          style="border-color:var(--border);color:var(--text);">
          <option value="">All Packages</option>
          <option value="Private">Private</option>
          <option value="Pro">Pro</option>
        </select>
      </div>
      <div class="flex items-center gap-3">
        <span id="table-info" class="text-xs" style="color:var(--text-muted);"></span>
        <select id="page-size" aria-label="Rows per page"
          class="filter-select px-3 py-2 rounded-lg text-xs border outline-none cursor-pointer transition-colors"
          style="border-color:var(--border);color:var(--text);">
          <option value="10">10 rows</option>
          <option value="20">20 rows</option>
          <option value="50">50 rows</option>
        </select>
      </div>
    </section>

    <!-- Table -->
    <section id="table-section" class="mt-3 rounded-xl border overflow-hidden" style="border-color:var(--border);background:var(--card);">
      <div class="table-wrap overflow-x-auto" style="max-height:70vh;overflow-y:auto;">
        <table class="data-table" id="data-table" role="grid">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div id="empty-state" class="hidden py-16 text-center">
        <svg class="mx-auto mb-3" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /><line x1="8" y1="11" x2="14" y2="11" />
        </svg>
        <p class="text-xs font-medium" style="color:var(--text-muted);">No matching records found</p>
        <button id="btn-clear-search" class="mt-3 text-xs font-semibold transition-colors" style="color:var(--accent);">Clear filters</button>
      </div>
    </section>

    <!-- Pagination -->
    <section id="pagination-section" class="mt-4 flex items-center justify-between">
      <button id="btn-prev" aria-label="Previous page" class="px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors disabled:opacity-30 disabled:cursor-not-allowed" style="border-color:var(--border);color:var(--text-sec);">
        <svg class="inline -mt-px mr-1" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6" /></svg>Prev
      </button>
      <div id="page-numbers" class="flex items-center gap-1" role="navigation" aria-label="Pagination"></div>
      <button id="btn-next" aria-label="Next page" class="px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors disabled:opacity-30 disabled:cursor-not-allowed" style="border-color:var(--border);color:var(--text-sec);">
        Next<svg class="inline -mt-px ml-1" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6" /></svg>
      </button>
    </section>
  </main>

  <!-- Modal -->
  <div id="details-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div>
          <h3 id="modal-title" class="font-display font-bold text-base" style="color:var(--text);">Details</h3>
          <div class="flex items-center gap-2 mt-1">
             <span id="modal-score-badge" class="badge"></span>
             <span id="modal-date" class="text-xs" style="color:var(--text-sec);"></span>
          </div>
        </div>
        <button id="btn-close-modal" class="w-8 h-8 rounded-md flex items-center justify-center transition-colors hover:bg-[var(--bg-raised)]" style="color:var(--text-sec);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="grid grid-cols-2 gap-4 mb-6">
           <div>
             <span class="label-text">Student</span>
             <div id="modal-student" class="text-sm font-medium" style="color:var(--text);"></div>
           </div>
           <div>
             <span class="label-text">Program</span>
             <div id="modal-program" class="text-sm" style="color:var(--text-sec);"></div>
           </div>
        </div>
        <div class="mb-6">
           <span class="label-text">Progress Notes</span>
           <div id="modal-notes" class="note-text bg-[var(--bg-raised)] p-3 rounded-lg border border-[var(--border)] mt-1"></div>
        </div>
        <div>
           <span class="label-text">Quality Reason</span>
           <div id="modal-reason" class="note-text text-[var(--text-sec)]"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-modal-ok" class="px-4 py-2 rounded-lg text-xs font-semibold transition-colors" style="background:var(--accent);color:#fff;">Close</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    'use strict';

    // ==========================================
    // CONFIGURATION
    // ==========================================
    const CONFIG = {
      // GANTI URL INI DENGAN URL DEPLOY APPS SCRIPT KAMU
      SHEET_ENDPOINT: 'https://script.google.com/macros/s/AKfycbxtBUfv5nMA7jo2mXdLOUc_NFKTgB4cnJjV04qEech-JcfzGp4imWxdJ-RbzNKiUeGRug/exec?source=session_qc',
      
      CACHE_KEY: 'tutoring_quality_cache_v2',
      CACHE_TTL: 3600, // Cache 1 jam (3600 detik)
      DEFAULT_PAGE_SIZE: 10,
      FETCH_TIMEOUT: 20000, // 20 detik timeout
      
      COLUMNS: [
        { key: 'full_name', label: 'Tutor', type: 'tutor_name', sticky: true },
        { key: 'student_name', label: 'Student', type: 'text', sticky: false },
        { key: 'program_name', label: 'Program', type: 'text', sticky: false },
        { key: 'package', label: 'Package', type: 'package_badge', sticky: false },
        { key: 'start_date', label: 'Date', type: 'date', sticky: false },
        { key: 'quality_score', label: 'Quality', type: 'quality_badge', sticky: false },
        { key: 'id', label: 'View', type: 'action_btn', sticky: false }, 
      ],
      SEARCHABLE_FIELDS: ['full_name', 'student_name'],
      
      // Transform data dari Apps Script (handle Array of Array atau Array of Object)
      RESPONSE_TRANSFORM: (raw) => {
        if (!raw) return [];
        // Jika raw adalah Array of Array (dari sheet.getDataRange().getValues())
        if (Array.isArray(raw) && raw.length > 0 && Array.isArray(raw[0])) {
          const headers = raw[0].map(h => String(h).trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, ''));
          return raw.slice(1).map(row => {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = row[i] != null ? row[i] : null; });
            return obj;
          });
        }
        // Jika raw sudah object atau wrapped {data: [...]}
        if (Array.isArray(raw)) return raw;
        if (raw && Array.isArray(raw.data)) return raw.data;
        return [];
      },
    };

    const AVATAR_COLORS = [
      { bg:'rgba(45,212,191,0.10)', border:'rgba(45,212,191,0.20)', fg:'#2DD4BF' },
      { bg:'rgba(251,191,36,0.10)', border:'rgba(251,191,36,0.20)', fg:'#FBBF24' },
      { bg:'rgba(248,113,113,0.10)', border:'rgba(248,113,113,0.20)', fg:'#F87171' },
      { bg:'rgba(129,140,248,0.10)', border:'rgba(129,140,248,0.20)', fg:'#818CF8' },
      { bg:'rgba(52,211,153,0.10)', border:'rgba(52,211,153,0.20)', fg:'#34D399' },
    ];

    const Utils = {
      formatDate: (val) => {
        if (!val) return '-';
        const d = new Date(val);
        if (isNaN(d.getTime())) return String(val);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      },
      formatTime: (val) => {
        if (!val && val !== 0) return '-';
        const s = String(val).trim();
        if (/^\d{1,2}:\d{2}/.test(s)) {
          const p = s.split(':'), h = parseInt(p[0],10), m = p[1], ap = h >= 12 ? 'PM' : 'AM', h12 = h === 0 ? 12 : h > 12 ? h-12 : h;
          return `${h12}:${m} ${ap}`;
        }
        return s;
      },
      debounce: (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; },
      toast: (msg, type = 'info', duration = 4000) => {
        const c = document.getElementById('toast-container'), el = document.createElement('div');
        el.className = `toast-msg toast-${type}`; el.textContent = msg; c.appendChild(el);
        requestAnimationFrame(() => el.classList.add('visible'));
        setTimeout(() => { el.classList.remove('visible'); setTimeout(() => el.remove(), 350); }, duration);
      },
      getInitials: (name) => {
        if (!name) return '?';
        const parts = String(name).trim().split(/\s+/);
        if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
        return parts[0].substring(0, 2).toUpperCase();
      },
      getAvatarColor: (name) => {
        if (!name) return AVATAR_COLORS[0];
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
      },
    };

    const State = {
      rawData: [], filteredData: [], columns: [],
      currentPage: 1, pageSize: CONFIG.DEFAULT_PAGE_SIZE,
      sortKey: 'start_date', sortDir: 'desc', 
      searchQuery: '', isLoading: true,
      filterQuality: '', filterPackage: '',
    };

    const DataService = (() => {
      const getCache = () => { 
        try { 
          const r = localStorage.getItem(CONFIG.CACHE_KEY); 
          if (!r) return null; 
          const {data,ts} = JSON.parse(r); 
          if (Array.isArray(data) && data.length > 0 && ts) return {data,ts}; 
        } catch(_){} 
        return null; 
      };
      
      const setCache = (data) => { 
        try { 
          localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({data,ts:Date.now()})); 
        } catch(_){} 
      };
      
      const isFresh = (ts) => (Date.now() - ts) < (CONFIG.CACHE_TTL * 1000);

      const fetch = async () => {
        // Jika tidak ada URL yang diset, return error
        if (!CONFIG.SHEET_ENDPOINT.trim()) throw new Error('Please set SHEET_ENDPOINT in code.');

        const cached = getCache();
        // Cek jika cache masih fresh
        if (cached && isFresh(cached.ts)) {
          Utils.toast('Loaded from cache', 'info');
          return { data: cached.data, fromCache: true };
        }

        try {
          const ctrl = new AbortController(), tid = setTimeout(() => ctrl.abort(), CONFIG.FETCH_TIMEOUT);
          const resp = await window.fetch(CONFIG.SHEET_ENDPOINT, { signal: ctrl.signal });
          clearTimeout(tid);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
          const raw = await resp.json();
          
          if (raw && raw.error) throw new Error(raw.error);
          
          const data = CONFIG.RESPONSE_TRANSFORM(raw);
          if (!Array.isArray(data) || data.length === 0) throw new Error('Empty response or invalid data format.');
          
          setCache(data);
          Utils.toast(`${data.length} entries loaded`, 'success');
          return { data, fromCache: false };
        } catch (err) {
          if (err.name === 'AbortError') throw new Error(`Request timed out after ${CONFIG.FETCH_TIMEOUT/1000}s.`);
          // Jika error tapi ada cache, gunakan cache (stale)
          if (cached) return { data: cached.data, fromCache: true, stale: true };
          throw err;
        }
      };

      const loadCached = () => { const c = getCache(); return c ? c.data : null; };
      return { fetch, loadCached, getCache };
    })();

    const Renderer = (() => {
      const $thead = document.getElementById('table-head');
      const $tbody = document.getElementById('table-body');
      const $info = document.getElementById('table-info');
      const $pages = document.getElementById('page-numbers');
      const $empty = document.getElementById('empty-state');
      const $prev = document.getElementById('btn-prev');
      const $next = document.getElementById('btn-next');

      const I = {
        srtA: `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>`,
        srtD: `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
        srtN: `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3"><polyline points="8 6 12 2 16 6"/><polyline points="8 18 12 22 16 18"/></svg>`,
        eye: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`
      };

      const renderHead = (cols) => {
        $thead.innerHTML = '<tr>' + cols.map(c => {
          const sorted = State.sortKey === c.key;
          const noSort = c.type === 'tutor_name' || c.type === 'package_badge' || c.type === 'quality_badge' || c.type === 'action_btn';
          const cls = [sorted?'sorted':'', c.sticky?'sticky-col':'', noSort?'no-sort':''].filter(Boolean).join(' ');
          const arrow = sorted ? (State.sortDir==='asc'?I.srtA:I.srtD) : (noSort?'':I.srtN);
          const as = sorted ? (State.sortDir==='asc'?'ascending':'descending') : 'none';
          return `<th class="${cls}" ${noSort?'':`data-sort="${c.key}"`} role="columnheader" aria-sort="${as}"><span class="inline-flex items-center gap-1">${c.label}${arrow?`<span class="inline-flex">${arrow}</span>`:''}</span></th>`;
        }).join('') + '</tr>';
      };

      const renderCell = (row, col) => {
        const v = row[col.key];
        switch (col.type) {
          case 'tutor_name': {
            const name = v || 'Unknown', initials = Utils.getInitials(name), colors = Utils.getAvatarColor(name);
            return `<div class="tutor-name-cell"><div class="tutor-avatar" style="background:${colors.bg};border-color:${colors.border};color:${colors.fg};">${initials}</div><span class="font-medium" style="color:var(--text);">${name}</span></div>`;
          }
          case 'package_badge': {
             const isPrivate = v === 'Private';
             return isPrivate 
               ? `<span class="badge" style="background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);">Private</span>`
               : `<span class="badge badge-day">Pro</span>`;
          }
          case 'quality_badge': {
            const score = Number(v);
            if (score >= 1 && score <= 5) return `<span class="badge badge-${score}">${score}</span>`;
            return `<span class="badge badge-muted">-</span>`;
          }
          case 'date': return Utils.formatDate(v);
          case 'action_btn': {
            return `<button class="p-1.5 rounded hover:bg-[var(--bg-raised)] transition-colors" style="color:var(--text-sec);" onclick="UIController.openModal(${row.id})">${I.eye}</button>`;
          }
          default: return v != null && v !== '' ? String(v) : `<span style="color:var(--text-muted);">-</span>`;
        }
      };

      const renderBody = (rows, cols) => {
        if (!rows.length) { $tbody.innerHTML = ''; $empty.classList.remove('hidden'); return; }
        $empty.classList.add('hidden');
        $tbody.innerHTML = rows.map(r => '<tr>' + cols.map(c => `<td class="${c.sticky?'sticky-col':''}">${renderCell(r,c)}</td>`).join('') + '</tr>').join('');
      };

      const renderInfo = () => {
        const t = State.filteredData.length;
        if (!t) { $info.textContent = ''; return; }
        const start = (State.currentPage-1)*State.pageSize+1, end = Math.min(State.currentPage*State.pageSize, t);
        $info.textContent = `${start}\u2013${end} of ${t}`;
      };

      const renderPag = () => {
        const t = State.filteredData.length, lp = Math.max(1, Math.ceil(t/State.pageSize));
        $prev.disabled = State.currentPage <= 1; $next.disabled = State.currentPage >= lp;
        let h = '';
        if (lp <= 7) { for (let i=1;i<=lp;i++) h += pb(i); }
        else {
          h += pb(1);
          if (State.currentPage > 3) h += `<span class="px-1 text-xs" style="color:var(--text-muted);">...</span>`;
          const s = Math.max(2,State.currentPage-1), e = Math.min(lp-1,State.currentPage+1);
          for (let i=s;i<=e;i++) h += pb(i);
          if (State.currentPage < lp-2) h += `<span class="px-1 text-xs" style="color:var(--text-muted);">...</span>`;
          h += pb(lp);
        }
        $pages.innerHTML = h;
      };

      const pb = (n) => {
        const active = n === State.currentPage;
        return `<button class="w-8 h-8 rounded-lg text-xs font-medium transition-colors" style="${active?'background:var(--accent);color:#fff;font-weight:700;':'color:var(--text-sec);'}" data-page="${n}" aria-label="Page ${n}">${n}</button>`;
      };

      const render = () => {
        const { filteredData, columns, currentPage, pageSize } = State;
        renderHead(columns);
        renderBody(filteredData.slice((currentPage-1)*pageSize, currentPage*pageSize), columns);
        renderInfo();
        renderPag();
      };

      return { render, renderHead, renderBody, renderInfo, renderPag };
    })();

    const UIController = (() => {
      
      const openModal = (id) => {
        const item = State.rawData.find(r => r.id == id); // use == for safety against string/int
        if (!item) return;

        document.getElementById('modal-title').textContent = item.full_name;
        document.getElementById('modal-student').textContent = item.student_name;
        document.getElementById('modal-program').textContent = item.program_name;
        document.getElementById('modal-notes').textContent = item.progress_notes || '-';
        document.getElementById('modal-reason').textContent = item.quality_reason || '-';
        document.getElementById('modal-date').textContent = Utils.formatDate(item.start_date);
        
        const badge = document.getElementById('modal-score-badge');
        const score = Number(item.quality_score);
        badge.className = 'badge'; 
        if(score >= 1 && score <=5) {
          badge.classList.add(`badge-${score}`);
          badge.textContent = score;
        } else {
           badge.classList.add('badge-muted');
           badge.textContent = 'N/A';
        }

        const modal = document.getElementById('details-modal');
        modal.classList.add('active');
        modal.setAttribute('aria-hidden', 'false');
      };

      const closeModal = () => {
        const modal = document.getElementById('details-modal');
        modal.classList.remove('active');
        modal.setAttribute('aria-hidden', 'true');
      };

      const detectColumns = (data) => {
        if (!data.length) return [...CONFIG.COLUMNS];
        const keys = new Set(Object.keys(data[0]));
        return CONFIG.COLUMNS.filter(c => keys.has(c.key));
      };

      const applyFilters = () => {
        let result = State.rawData;
        
        if (State.filterQuality !== '') { 
          const val = Number(State.filterQuality); 
          result = result.filter(r => Number(r.quality_score) === val); 
        }

        if (State.filterPackage !== '') { 
          const val = State.filterPackage; 
          result = result.filter(r => String(r.package) === val); 
        }

        const q = State.searchQuery.toLowerCase().trim();
        if (q) { 
          result = result.filter(r => CONFIG.SEARCHABLE_FIELDS.some(f => String(r[f]||'').toLowerCase().includes(q))); 
        }
        
        State.filteredData = result;
        applySortToFiltered();
        State.currentPage = 1;
      };

      const applyFiltersAndRender = () => { applyFilters(); Renderer.render(); };

      const applySortToFiltered = () => {
        if (!State.sortKey) return;
        const dir = State.sortDir === 'asc' ? 1 : -1, key = State.sortKey;
        State.filteredData.sort((a, b) => {
          let va = a[key], vb = b[key];
          if (va === null || va === undefined) va = ''; if (vb === null || vb === undefined) vb = '';
          
          if (key === 'start_date' || key === 'end_date') return (new Date(va) - new Date(vb)) * dir;
          if (key === 'quality_score') return (Number(va)||0) - (Number(vb)||0) * dir;
          return String(va).toLowerCase().localeCompare(String(vb).toLowerCase()) * dir;
        });
      };

      const clearAllFilters = () => {
        State.filterQuality = ''; State.filterPackage = ''; State.searchQuery = '';
        document.getElementById('filter-quality').value = '';
        document.getElementById('filter-package').value = '';
        document.getElementById('search-input').value = '';
        applyFiltersAndRender();
      };

      const showError = (msg, hasCache) => {
        document.getElementById('error-section').classList.add('active');
        document.getElementById('controls-section').classList.add('hidden');
        document.getElementById('table-section').classList.add('hidden');
        document.getElementById('pagination-section').classList.add('hidden');
        document.getElementById('error-msg').textContent = msg;
        document.getElementById('btn-use-cache').classList.toggle('hidden', !hasCache);
      };

      const hideError = () => {
        document.getElementById('error-section').classList.remove('active');
        document.getElementById('controls-section').classList.remove('hidden');
        document.getElementById('table-section').classList.remove('hidden');
        document.getElementById('pagination-section').classList.remove('hidden');
      };

      const setLoading = (loading) => { 
        const icon = document.getElementById('refresh-icon'); 
        if (icon) icon.classList.toggle('spin', loading); 
      };

      const loadData = async (showLoading = true) => {
        if (showLoading) { State.isLoading = true; Renderer.renderHead(CONFIG.COLUMNS); Renderer.renderBody([], CONFIG.COLUMNS); hideError(); setLoading(true); }
        try {
          const result = await DataService.fetch();
          State.rawData = result.data;
          State.rawData.sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
          
          State.columns = detectColumns(result.data);
          State.sortKey = 'start_date'; State.sortDir = 'desc';
          
          State.searchQuery = ''; State.filterQuality = ''; State.filterPackage = '';
          State.currentPage = 1; State.pageSize = CONFIG.DEFAULT_PAGE_SIZE;
          
          document.getElementById('search-input').value = '';
          document.getElementById('filter-quality').value = '';
          document.getElementById('filter-package').value = '';
          document.getElementById('page-size').value = String(CONFIG.DEFAULT_PAGE_SIZE);
          
          applyFilters();
          State.isLoading = false;
          setLoading(false);
          hideError();
          
          Renderer.renderHead(State.columns);
          Renderer.renderBody(State.filteredData.slice(0, State.pageSize), State.columns);
          Renderer.renderInfo();
          Renderer.renderPag();
          
          if (result.stale) Utils.toast('Showing cached data (Fetch failed)', 'error');
        } catch (err) {
          State.isLoading = false; setLoading(false);
          showError(err.message || 'Network error', !!DataService.getCache());
        }
      };

      const loadFromCache = () => {
        const cached = DataService.loadCached();
        if(cached) {
           State.rawData = cached;
           State.columns = detectColumns(cached);
           applyFilters();
           hideError();
           Renderer.render();
           Utils.toast('Loaded from cache', 'info');
        }
      };

      const exportCSV = () => {
        const data = State.filteredData;
        if (!data.length) { Utils.toast('No data to export', 'error'); return; }
        const cols = State.columns.filter(c => c.key !== 'action'); 
        const hdr = cols.map(c => `"${c.label}"`).join(',');
        const rows = data.map(r => cols.map(c => { let v = r[c.key]; if (v == null) v = ''; return `"${String(v).replace(/"/g,'""')}"`; }).join(','));
        const blob = new Blob(['\uFEFF' + [hdr,...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob), a = document.createElement('a');
        a.href = url; a.download = `quality_tracker_${new Date().toISOString().slice(0,10)}.csv`; a.click();
        URL.revokeObjectURL(url); Utils.toast(`${data.length} entries exported`, 'success');
      };

      const toggleTheme = () => {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('quality_dashboard_theme', next); } catch(_){}
      };

      const initTheme = () => {
        try { const s = localStorage.getItem('quality_dashboard_theme'); if (s) { document.documentElement.setAttribute('data-theme', s); return; } } catch(_){}
        if (window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.setAttribute('data-theme', 'light');
      };

      const bindEvents = () => {
        document.getElementById('filter-quality').addEventListener('change', e => { State.filterQuality = e.target.value; applyFiltersAndRender(); });
        document.getElementById('filter-package').addEventListener('change', e => { State.filterPackage = e.target.value; applyFiltersAndRender(); });
        document.getElementById('search-input').addEventListener('input', Utils.debounce(e => { State.searchQuery = e.target.value; applyFiltersAndRender(); }, 250));
        document.getElementById('btn-clear-search').addEventListener('click', clearAllFilters);
        document.getElementById('page-size').addEventListener('change', e => { State.pageSize = parseInt(e.target.value,10)||10; State.currentPage = 1; Renderer.render(); });
        document.getElementById('table-head').addEventListener('click', e => {
          const th = e.target.closest('th[data-sort]'); if (!th) return;
          const key = th.getAttribute('data-sort');
          if (State.sortKey === key) State.sortDir = State.sortDir === 'asc' ? 'desc' : 'asc';
          else { State.sortKey = key; State.sortDir = 'asc'; }
          applySortToFiltered(); State.currentPage = 1; Renderer.render();
        });
        document.getElementById('page-numbers').addEventListener('click', e => {
          const btn = e.target.closest('[data-page]'); if (!btn) return;
          State.currentPage = parseInt(btn.getAttribute('data-page'), 10); Renderer.render();
          document.getElementById('table-section').scrollIntoView({ behavior:'smooth', block:'nearest' });
        });
        document.getElementById('btn-prev').addEventListener('click', () => { if (State.currentPage > 1) { State.currentPage--; Renderer.render(); } });
        document.getElementById('btn-next').addEventListener('click', () => { const lp = Math.ceil(State.filteredData.length/State.pageSize); if (State.currentPage < lp) { State.currentPage++; Renderer.render(); } });
        document.getElementById('btn-export').addEventListener('click', exportCSV);
        document.getElementById('btn-theme').addEventListener('click', toggleTheme);
        document.getElementById('btn-retry').addEventListener('click', () => loadData(true));
        document.getElementById('btn-use-cache').addEventListener('click', loadFromCache);
        document.getElementById('btn-refresh').addEventListener('click', () => { 
             try { localStorage.removeItem(CONFIG.CACHE_KEY); } catch(_){} 
             loadData(true); 
        });
        
        // Modal events
        document.getElementById('btn-close-modal').addEventListener('click', closeModal);
        document.getElementById('btn-modal-ok').addEventListener('click', closeModal);
        document.getElementById('details-modal').addEventListener('click', (e) => {
            if (e.target.id === 'details-modal') closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('details-modal').classList.contains('active')) closeModal();
        });
      };

      const init = () => { initTheme(); bindEvents(); loadData(true); };
      return { init, applyFiltersAndRender, openModal };
    })();

    document.addEventListener('DOMContentLoaded', UIController.init);
  </script>
</body>
</html>
